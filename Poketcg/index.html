<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poketcg</title>

    <style>
      /* basic tidy + responsive svg helpers */
      :root {
        --bg: #1E1E1E;
        --muted-border: #444444;
        --brand-bg: #F5F5F5;
        --text-on-brand: #1E1E1E;
      }

      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: #fff;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      }

      .app {
        width: 100%;
        min-height: 100vh;
        position: relative;
        overflow: hidden;
        padding: 48px 24px;
        box-sizing: border-box;
      }

      .top-left {
        width: 139px;
        height: 47px;
        position: absolute;
        left: 39px;
        top: 52px;
        display: inline-flex;
        gap: 12px;
        align-items: center;
      }

      .avatar svg {
        width: 40px;
        height: 40px;
        display: block;
      }

      .title-block {
        position: absolute;
        left: 40%;
        top: 157px;
        width: 450px;
        height: 135px;
        display: inline-flex;
        justify-content: center;
        align-items: center;
      }

      .title {
        text-align: center;
        color: white;
        font-size: 4rem;
        font-weight: 700;
        line-height: 1;
        text-shadow: 0 4px 4px rgba(0,0,0,0.25);
      }

      /* responsive decorative svgs */
      .decor-svg {
        position: absolute;
        width: 100%;
        max-width: 397px;
        height: auto;
        display: block;
      }

      /* form card */
      .form-wrapper {
        position: absolute;
        left: 35%;
        top: 401px;
        display: inline-flex;
        flex-direction: column;
        gap: 16px;
        align-items: center;
      }

      .card {
        width: 680px;
        min-width: 320px;
        padding: 24px;
        background: var(--bg);
        border-radius: 8px;
        outline: 1px solid var(--muted-border);
        outline-offset: -1px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        box-sizing: border-box;
      }

      .field {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .input-like {
        min-width: 120px;
        padding: 12px 16px;
        background: var(--bg);
        border-radius: 8px;
        outline: 1px solid var(--muted-border);
        display: inline-flex;
        align-items: center;
        color: rgba(255,255,255,0.4);
      }

      .actions {
        width: 100%;
        display: flex;
        gap: 16px;
      }

      .btn-primary {
        flex: 1 1 0;
        padding: 12px;
        background: var(--brand-bg);
        border-radius: 8px;
        outline: 1px solid var(--brand-bg);
        display: flex;
        justify-content: center;
        align-items: center;
        color: var(--text-on-brand);
        cursor: pointer;
      }

      /* small screens */
      @media (max-width: 800px) {
        .title-block { left: 8%; width: 80%; }
        .form-wrapper { left: 8%; top: 520px; }
        .card { width: calc(100vw - 64px); }
      }
    </style>
  </head>

  <body>
    <div class="app">
      <div class="top-left">
        <div class="avatar" data-svg-wrapper data-shape="Circle" data-size="Large" data-type="Image">
          <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <g clip-path="url(#clip0_32_17)">
              <rect width="40" height="40" fill="url(#pattern0_32_17)"/>
            </g>
            <defs>
              <pattern id="pattern0_32_17" patternContentUnits="objectBoundingBox" width="1" height="1">
                <use xlink:href="#image0_32_17" transform="scale(0.00195312)"/>
              </pattern>
              <clipPath id="clip0_32_17">
                <path d="M0 20C0 8.95431 8.95431 0 20 0C31.0457 0 40 8.95431 40 20C40 31.0457 31.0457 40 20 40C8.95431 40 0 31.0457 0 20Z" fill="white"/>
              </clipPath>
            </defs>
          </svg>
        </div>

        <div style="display:flex; flex-direction:column; gap:2px;">
          <div style="color:#F9F9F9; font-size:16px; font-weight:600;">Name</div>
          <div style="color:#F9F9F9; font-size:16px;">Rank</div>
        </div>
      </div>

      <div class="title-block" aria-hidden="true">
        <div class="title">PokeTCG Player</div>

        <svg class="decor-svg" style="left:36px; top:106px;" viewBox="0 0 397 85" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M396.992 26.5671C395.667 109.067 196.452 80.0528 196.452 80.0528C196.452 80.0528 1.33043 108.884 0.00769075 26.5671C-1.31505 -55.7495 168.39 80.0528 196.452 80.0528C224.514 80.0528 398.318 -55.9326 396.992 26.5671Z" fill="#D9D9D9"/>
        </svg>

        <svg class="decor-svg" style="left:36px; top:-56px;" viewBox="0 0 397 85" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M0.00753784 58.3996C1.3331 -24.1 200.5 4.96674 200.5 4.96674C200.5 4.96674 395.67 -23.9169 396.992 58.3997C398.315 140.716 228.562 4.96675 200.5 4.96674C172.438 4.96672 -1.31802 140.899 0.00753784 58.3996Z" fill="#EA7A7A"/>
        </svg>
      </div>

      <div class="form-wrapper">
        <div class="card" role="form" aria-label="Sign in">
          <div class="field">
            <div style="color:var(--text,white); font-size:16px;">Email</div>
            <input class="Email" type="email" placeholder="Enter your email" />
          </div>

          <div class="field">
            <div style="color:var(--text,white); font-size:16px;">Password</div>
            <input class="Pass" type="password" placeholder="Enter your password" />
          </div>

          <div class="actions">
            <div class="btn-primary">Sign In</div>
          </div>

          <div style="width:100%; text-align:left; color: white; font-size:16px; text-decoration:underline;">Forgot password?</div>
        </div>

        <div class= "error" style="width:680px; color:white; font-size:16px;">Error</div>
      </div>
    </div>
  </body>


</html>    <div id="root"></div>
    <script type="module" src="src/main.jsx"></script>
  </body>
</html>
